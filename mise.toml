[env]
python = "3.13"

[tools]
python = "3.13"
uv = "latest"

[tasks.test]
run = "uv run pytest tests/ -v"
description = "Run unit tests"

[tasks.test-e2e]
run = "bats tests/e2e/"
description = "Run E2E tests via bats"

[tasks.lint]
run = "uv run ruff check"
description = "Lint Python"

[tasks.lint-fix]
run = "uv run ruff check --fix"
description = "Apply lint fixes"

[tasks.format]
run = "uv run ruff format"
description = "Format Python"

[tasks.format-check]
run = "uv run ruff format --check"
description = "Check formatting"

[tasks.check-types]
run = 'echo "No type checker configured"'
description = "Type check"

[tasks.check]
depends = ["lint", "format-check"]
description = "All validation checks"

[tasks.fix]
depends = ["lint-fix", "format"]
description = "Format + lint fix"

[tasks.setup]
run = "uv sync --extra dev && git config core.hooksPath .githooks"
description = "Install deps + configure git hooks"

[tasks.clean]
run = "rm -rf .ruff_cache/ .pytest_cache/ __pycache__/ .mypy_cache/ dist/ build/ *.egg-info/"
description = "Remove artifacts"

[tasks.dev]
run = "uv run deviate"
description = "Run the deviate CLI (pass args directly, e.g. `mise run dev init`)"

[tasks.install-tool]
run = "uv tool install --editable ."
description = "Install package as editable tool via uv"

[tasks.help]
run = "mise tasks"
description = "List tasks"


[tasks.docs]
run = "cd apps/docs && mise run dev"
description = "Run the Starlight docs dev server (alias for cd apps/docs && mise run dev)"

[tasks."docs:install"]
run = "cd apps/docs && mise run install"
description = "Install Starlight + Astro dependencies (creates apps/docs/node_modules/)"

[tasks."docs:build"]
run = "cd apps/docs && mise run build"
description = "Build the static docs site into apps/docs/dist/"

[tasks."docs:preview"]
run = "cd apps/docs && mise run preview"
description = "Serve the built static docs site"